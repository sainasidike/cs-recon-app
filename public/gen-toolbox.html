<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<script>
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
  const canvas = document.getElementById('c');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const x = 792, y = 600, w = 242, h = 119, radius = 10;

  ctx.beginPath();
  ctx.moveTo(x+radius, y);
  ctx.arcTo(x+w, y, x+w, y+h, radius);
  ctx.arcTo(x+w, y+h, x, y+h, radius);
  ctx.arcTo(x, y+h, x, y, radius);
  ctx.arcTo(x, y, x+w, y, radius);
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.stroke();

  const ix = x+18, iy = y+16;
  ctx.beginPath();
  ctx.moveTo(ix+4, iy);
  ctx.arcTo(ix+28, iy, ix+28, iy+24, 4);
  ctx.arcTo(ix+28, iy+24, ix, iy+24, 4);
  ctx.arcTo(ix, iy+24, ix, iy, 4);
  ctx.arcTo(ix, iy, ix+28, iy, 4);
  ctx.closePath();
  ctx.fillStyle = '#43A047';
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(ix+5, iy+7); ctx.lineTo(ix+12, iy+7);
  ctx.moveTo(ix+5, iy+11); ctx.lineTo(ix+12, iy+11);
  ctx.moveTo(ix+5, iy+15); ctx.lineTo(ix+10, iy+15);
  ctx.moveTo(ix+15, iy+7); ctx.lineTo(ix+22, iy+7);
  ctx.moveTo(ix+15, iy+11); ctx.lineTo(ix+22, iy+11);
  ctx.moveTo(ix+15, iy+15); ctx.lineTo(ix+20, iy+15);
  ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ix+16,iy+18); ctx.lineTo(ix+19,iy+21); ctx.lineTo(ix+24,iy+16); ctx.stroke();

  ctx.fillStyle = '#1a1a1a';
  ctx.font = '600 15px system-ui, -apple-system, sans-serif';
  ctx.fillText('财务对账', x+18, iy+44);

  ctx.fillStyle = '#999';
  ctx.font = '12px system-ui, -apple-system, sans-serif';
  ctx.fillText('AI 智能匹配银行流水与企业', x+18, iy+62);
  ctx.fillText('账簿，自动生成余额调节表', x+18, iy+78);

  document.title = 'DONE';
};
img.src = 'http://localhost:5180/toolbox-bg.png';
</script>
</body>
</html>
