<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif; background: #f0f0f0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* 顶部导航栏 */
.cs-reader-topbar {
  height: 52px;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  display: flex;
  align-items: center;
  padding: 0 20px;
  flex-shrink: 0;
}
.cs-reader-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cs-reader-logo svg { width: 28px; height: 28px; }
.cs-reader-logo span { font-size: 14px; font-weight: 600; color: #333; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 标签页 */
.cs-reader-tabs {
  display: flex;
  align-items: center;
  gap: 0;
  margin-left: 32px;
}
.cs-reader-tab {
  padding: 8px 18px;
  font-size: 14px;
  color: #666;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.cs-reader-tab:hover { color: #333; }
.cs-reader-tab.active { color: #00c4a1; font-weight: 600; }
.cs-reader-tab.active::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: #00c4a1;
  border-radius: 2px;
}
.cs-reader-tab .new-badge {
  position: absolute;
  top: 2px;
  right: 4px;
  font-size: 9px;
  background: #ff4d4f;
  color: #fff;
  padding: 0 4px;
  border-radius: 3px;
  font-weight: 600;
  line-height: 14px;
}

/* 顶栏右侧按钮 */
.cs-reader-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.cs-reader-btn-share {
  padding: 7px 16px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 13px;
  color: #333;
  cursor: pointer;
  background: #fff;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cs-reader-btn-share:hover { border-color: #00c4a1; color: #00c4a1; }
.cs-reader-btn-save {
  padding: 7px 20px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  color: #fff;
  background: #00c4a1;
  cursor: pointer;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cs-reader-btn-save:hover { background: #00b392; }

/* 视图模式栏 */
.cs-reader-viewbar {
  height: 40px;
  background: #fafafa;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-shrink: 0;
}
.cs-reader-viewbar-item {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cs-reader-viewbar-item:hover { color: #333; }
.cs-reader-viewbar-item.active { color: #00c4a1; }
.cs-reader-viewbar-item svg { width: 14px; height: 14px; }

/* 主体 */
.cs-reader-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* 左侧缩略图 */
.cs-reader-thumbs {
  width: 64px;
  background: #fff;
  border-right: 1px solid #eee;
  overflow-y: auto;
  padding: 12px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.cs-reader-thumb {
  width: 50px;
  height: 64px;
  border: 2px solid transparent;
  border-radius: 4px;
  background: #f5f5f5;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #999;
  gap: 2px;
  transition: all 0.15s;
  position: relative;
}
.cs-reader-thumb.active { border-color: #00c4a1; background: #f0fdf9; }
.cs-reader-thumb:hover:not(.active) { background: #eee; }
.cs-reader-thumb-label {
  font-size: 10px;
  color: #666;
  margin-top: 2px;
}

/* 文档内容区 */
.cs-reader-content {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  display: flex;
  justify-content: center;
  background: #e8e8e8;
}
.cs-reader-paper {
  background: #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  padding: 48px 56px;
  max-width: 900px;
  width: 100%;
  min-height: 1100px;
  font-size: 13px;
  line-height: 1.8;
}

/* 文档内容样式 */
.doc-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 28px;
  color: #1a1a1a;
}
.doc-info {
  margin-bottom: 8px;
  font-size: 13px;
  color: #333;
}
.doc-info strong { font-weight: 600; }
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 12px;
}
.doc-table th, .doc-table td {
  padding: 10px 12px;
  border: 1px solid #e8e8e8;
  text-align: left;
}
.doc-table th {
  background: #f9f9f9;
  font-weight: 600;
  color: #555;
}
.doc-table td.debit { color: #e53935; }
.doc-table td.credit { color: #00c4a1; }

/* 底部分页栏 */
.cs-reader-footer {
  height: 40px;
  background: #fff;
  border-top: 1px solid #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-shrink: 0;
}
.cs-reader-footer-btn {
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
  cursor: pointer;
  color: #999;
  border-radius: 4px;
}
.cs-reader-footer-btn:hover { background: #f0f0f0; color: #333; }
.cs-reader-footer-page { font-size: 13px; color: #666; }
.cs-reader-footer-zoom {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 24px;
  font-size: 13px;
  color: #666;
}
.cs-reader-footer-zoom span { cursor: pointer; font-size: 16px; color: #999; }
.cs-reader-footer-zoom span:hover { color: #333; }

/* 对账分栏模式 */
.cs-recon-split {
  flex: 1;
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow: hidden;
}
.cs-recon-split-left,
.cs-recon-split-right {
  flex: 1;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e8e8e8;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cs-recon-split-header {
  height: 44px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
  font-weight: 500;
  color: #333;
  flex-shrink: 0;
}
.cs-recon-header-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px solid #e0e0e0;
  border-radius: 5px;
  background: #fff;
  font-size: 12px;
  color: #666;
  cursor: pointer;
}
.cs-recon-header-btn:hover { border-color: #00c4a1; color: #00c4a1; }
.cs-recon-header-btn.primary {
  background: #00c4a1;
  color: #fff;
  border-color: #00c4a1;
}
.cs-recon-header-btn.primary:hover { background: #00b392; }
.cs-recon-split-doc {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
  font-size: 12px;
  line-height: 1.7;
}
.cs-recon-split-doc .doc-title { font-size: 15px; text-align: center; font-weight: 700; margin-bottom: 20px; }
.cs-recon-split-doc .doc-info { font-size: 12px; margin-bottom: 6px; }
.cs-recon-split-doc .doc-table { font-size: 11px; }
.cs-recon-split-doc .doc-table th,
.cs-recon-split-doc .doc-table td { padding: 6px 8px; }
.cs-recon-split-footer {
  height: 36px;
  border-top: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 12px;
  color: #666;
  flex-shrink: 0;
}
.cs-recon-page-btn { cursor: pointer; color: #999; }
.cs-recon-page-btn:hover { color: #333; }
.cs-recon-page-info { color: #666; }
</style>
</head>

// 银行对账单数据
var bankData = {
  title: '中国工商银行企业对账单',

    { date: '2026-04-02', time: '15:30:45', desc: 'POS消费入账', counterparty: '美团收付通', debit: null, credit: 47800, balance: 266300 },
    { date: '2026-04-03', time: '10:12:08', desc: '转账汇款-贷款', counterparty: '永辉超市股份有限公司', debit: 18500, credit: null, balance: 247800 },
    { date: '2026-04-04', time: '10:00:00', desc: '代发工资', counterparty: '批量代发(28人)', debit: 89000, credit: null, balance: 158800 },
    { date: '2026-04-05', time: '16:22:33', desc: 'POS消费入账', counterparty: '饿了么结算中心', debit: null, credit: 32600, balance: 191400 },
    { date: '2026-04-07', time: '09:40:15', desc: '转账汇款-燃气费', counterparty: '杭州燃气集团有限公司', debit: 4200, credit: null, balance: 187200 },

    { date: '2026-04-14', time: '17:10:55', desc: 'POS消费入账', counterparty: '大众点评商户结算', debit: null, credit: 15200, balance: 193465 },

    { date: '2026-04-25', time: '09:00:00', desc: '贷款还款', counterparty: '中国工商银行(内部)', debit: 8000, credit: null, balance: 212165 },

function fmt(val) {
  if (val === null || val === undefined) return '';
  return Number(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderPaper() {
  var d = bankData;
  var html = '';
  html += '<div class="doc-title">' + d.title + '</div>';
  html += '<div class="doc-info"><strong>单位名称：</strong>' + d.company + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<strong>账　号：</strong>' + d.account + '</div>';
  html += '<div class="doc-info"><strong>开户网点：</strong>' + d.bank + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<strong>币　种：</strong>' + d.currency + '</div>';
  html += '<div class="doc-info"><strong>对账区间：</strong>' + d.period + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<strong>打印时间：</strong>' + d.printTime + '</div>';
  html += '<div class="doc-info"><strong>上期余额：</strong>' + d.prevBalance + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<strong>本期余额：</strong>' + d.currBalance + '</div>';

  html += '<table class="doc-table">';
  html += '<thead><tr><th>记账日期</th><th>交易时间</th><th>摘要/用途</th><th>借方金额</th><th>贷方金额</th><th>余额</th><th>对方户名</th></tr></thead>';
  html += '<tbody>';
  d.entries.forEach(function(e) {
    html += '<tr>';
    html += '<td>' + e.date + '</td>';
    html += '<td>' + e.time + '</td>';
    html += '<td>' + e.desc + ' ' + e.counterparty + '</td>';
    html += '<td class="debit">' + (e.debit ? fmt(e.debit) : '') + '</td>';
    html += '<td class="credit">' + (e.credit ? fmt(e.credit) : '') + '</td>';
    html += '<td>' + fmt(e.balance) + '</td>';
    html += '<td>' + e.counterparty + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';

  document.getElementById('paper').innerHTML = html;
}

function renderThumbs() {
  var totalPages = 13;
  var activePage = 2;
  var html = '';
  for (var i = 1; i <= 4; i++) {
    html += '<div class="cs-reader-thumb' + (i === activePage ? ' active' : '') + '">';
    html += '<div style="font-size:9px;color:#999;">详查序</div>';
    html += '<div class="cs-reader-thumb-label">' + i + '</div>';
    html += '</div>';
  }
  document.getElementById('thumbs').innerHTML = html;
  document.getElementById('pageInfo').textContent = activePage + ' / ' + totalPages;
}

renderPaper();
renderThumbs();

// 标签切换逻辑
var tabs = document.querySelectorAll('.cs-reader-tab');
var readMode = document.getElementById('readMode');
var reconMode = document.getElementById('reconMode');
var reconIframe = document.getElementById('reconIframe');
var reconDocView = document.getElementById('reconDocView');
var viewbar = document.querySelector('.cs-reader-viewbar');
var readerFooter = document.getElementById('readerFooter');
var reconLoaded = false;

tabs.forEach(function(tab) {
  tab.addEventListener('click', function() {
    tabs.forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');

    if (tab.id === 'tabRecon') {
      readMode.style.display = 'none';
      reconMode.style.display = 'flex';
      viewbar.style.display = 'none';
      readerFooter.style.display = 'none';
      // 复制文档内容到左侧面板
      reconDocView.innerHTML = document.getElementById('paper').innerHTML;
      if (!reconLoaded) {
        reconIframe.src = 'https://cs-pc-reconciliation.vercel.app/?embed=1&autoload=bank_jinli';
        reconLoaded = true;
      }
    } else {
      readMode.style.display = 'flex';
      reconMode.style.display = 'none';
      viewbar.style.display = 'flex';
      readerFooter.style.display = 'flex';
    }
  });
});


// 监听对账 iframe 消息
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'recon-open-file') {
    var file = e.data.file;
    if (!file) return;
    renderFileInLeftPanel(file);
  }

  if (e.data.type === 'recon-save-result') {
    showResultFullPage(e.data);
  }
});

// 保存结果后：切回阅读模式，显示余额调节表文档
function showReconciliationReport(data) {
  // 切回阅读模式
  tabs.forEach(function(t) { t.classList.remove('active'); });
  tabs[0].classList.add('active');
  readMode.style.display = 'flex';
  reconMode.style.display = 'none';
  viewbar.style.display = 'flex';
  readerFooter.style.display = 'flex';

  // 渲染余额调节表到文档区域
  var paper = document.getElementById('paper');
  paper.innerHTML = renderReconReport(data);

  // 更新缩略图
  document.getElementById('thumbs').innerHTML =
    '<div class="cs-reader-thumb active"><div style="font-size:9px;color:#999;">调节表</div><div class="cs-reader-thumb-label">1</div></div>' +
    '<div class="cs-reader-thumb"><div style="font-size:9px;color:#999;">明细</div><div class="cs-reader-thumb-label">2</div></div>';
  document.getElementById('pageInfo').textContent = '1 / 2';
}

function renderReconReport(data) {
  var recon = data.reconciliation;
  var scenario = data.scenario;
  var matchResults = data.matchResults;
  var periodStart = data.periodStart;
  var periodEnd = data.periodEnd;
  if (!recon) return '<p style="text-align:center;color:#999;padding:60px;">暂无数据</p>';

  var sideALabel = (scenario && scenario.sideA && scenario.sideA.shortLabel) || 'A方';
  var sideBLabel = (scenario && scenario.sideB && scenario.sideB.shortLabel) || 'B方';
  var reportTitle = (scenario && scenario.reportTitle) || '余额调节表';
  var period = (periodStart && periodEnd) ? (periodStart + ' ~ ' + periodEnd) : new Date().toISOString().slice(0, 7);
  var now = new Date().toLocaleString('zh-CN');
  var isBalanced = recon.isBalanced;
  var useBalanceMode = recon.useBalanceMode;

  var html = '';
  html += '<div class="doc-title">' + escapeHtml(reportTitle) + '</div>';
  html += '<div style="text-align:center;font-size:12px;color:#999;margin-bottom:28px;">对账期间：' + escapeHtml(period) + ' &nbsp;|&nbsp; 生成时间：' + escapeHtml(now) + '</div>';

  // 结论横幅
  html += '<div style="text-align:center;padding:24px;margin-bottom:28px;border-radius:12px;border:1px solid ' + (isBalanced ? '#d1fae5' : '#fecaca') + ';background:' + (isBalanced ? '#f0fdf9' : '#fef2f2') + ';">';
  html += '<div style="font-size:28px;margin-bottom:8px;">' + (isBalanced ? '✓' : '✕') + '</div>';
  if (useBalanceMode) {
    html += '<div style="font-size:15px;color:#333;font-weight:600;">' + (isBalanced ? '调节后余额一致' : '调节后余额不一致') + '</div>';
    html += '<div style="font-size:22px;font-weight:300;color:' + (isBalanced ? '#00c4a1' : '#e53935') + ';margin-top:6px;">¥ ' + fmt(recon.sideAAdjusted) + '</div>';
    if (!isBalanced) {
      html += '<div style="font-size:12px;color:#e53935;margin-top:6px;">差额：¥ ' + fmt(Math.abs(recon.sideAAdjusted - recon.sideBAdjusted)) + '</div>';
    }
  } else {
    html += '<div style="font-size:15px;color:#333;font-weight:600;">' + (isBalanced ? '全部单据匹配成功' : '存在未匹配单据') + '</div>';
    html += '<div style="font-size:22px;font-weight:300;color:' + (isBalanced ? '#00c4a1' : '#e53935') + ';margin-top:6px;">匹配率 ' + (recon.matchRate || 0).toFixed(1) + '%</div>';
    html += '<div style="font-size:12px;color:#666;margin-top:6px;">匹配金额合计：¥ ' + fmt(recon.matchedAmount) + '</div>';
  }
  html += '</div>';

  if (useBalanceMode) {
    // A方调节
    html += '<div style="font-size:14px;font-weight:700;color:#333;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;">' + escapeHtml(sideALabel) + ' 对账单</div>';
    html += '<table class="doc-table">';
    html += '<thead><tr><th style="width:60%">项目</th><th style="text-align:right;">金额</th></tr></thead>';
    html += '<tbody>';
    var balLabel = (scenario && scenario.balanceLabels && scenario.balanceLabels.sideA) || (sideALabel + '余额');
    html += '<tr><td style="font-weight:600;">' + escapeHtml(balLabel) + '</td><td style="text-align:right;font-weight:600;">¥ ' + fmt(recon.sideABalance) + '</td></tr>';
    if (recon.sideAAdj && recon.sideAAdj.adds) {
      recon.sideAAdj.adds.forEach(function(item) {
        html += '<tr><td class="credit">加：' + escapeHtml((item.date || '') + ' ' + (item.description || item.reason || '')) + '</td><td class="credit" style="text-align:right;">+ ¥ ' + fmt(item.amount) + '</td></tr>';
      });
    }
    if (recon.sideAAdj && recon.sideAAdj.subs) {
      recon.sideAAdj.subs.forEach(function(item) {
        html += '<tr><td class="debit">减：' + escapeHtml((item.date || '') + ' ' + (item.description || item.reason || '')) + '</td><td class="debit" style="text-align:right;">- ¥ ' + fmt(item.amount) + '</td></tr>';
      });
    }
    html += '<tr style="background:#f9fafb;font-weight:700;"><td>调节后余额</td><td style="text-align:right;">¥ ' + fmt(recon.sideAAdjusted) + '</td></tr>';
    html += '</tbody></table>';

    // B方调节
    html += '<div style="font-size:14px;font-weight:700;color:#333;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;">' + escapeHtml(sideBLabel) + ' 账面</div>';
    html += '<table class="doc-table">';
    html += '<thead><tr><th style="width:60%">项目</th><th style="text-align:right;">金额</th></tr></thead>';
    html += '<tbody>';
    var balLabelB = (scenario && scenario.balanceLabels && scenario.balanceLabels.sideB) || (sideBLabel + '余额');
    html += '<tr><td style="font-weight:600;">' + escapeHtml(balLabelB) + '</td><td style="text-align:right;font-weight:600;">¥ ' + fmt(recon.sideBBalance) + '</td></tr>';
    if (recon.sideBAdj && recon.sideBAdj.adds) {
      recon.sideBAdj.adds.forEach(function(item) {
        html += '<tr><td class="credit">加：' + escapeHtml((item.date || '') + ' ' + (item.description || item.reason || '')) + '</td><td class="credit" style="text-align:right;">+ ¥ ' + fmt(item.amount) + '</td></tr>';
      });
    }
    if (recon.sideBAdj && recon.sideBAdj.subs) {
      recon.sideBAdj.subs.forEach(function(item) {
        html += '<tr><td class="debit">减：' + escapeHtml((item.date || '') + ' ' + (item.description || item.reason || '')) + '</td><td class="debit" style="text-align:right;">- ¥ ' + fmt(item.amount) + '</td></tr>';
      });
    }
    html += '<tr style="background:#f9fafb;font-weight:700;"><td>调节后余额</td><td style="text-align:right;">¥ ' + fmt(recon.sideBAdjusted) + '</td></tr>';
    html += '</tbody></table>';
  } else {
    // 匹配模式
    var ms = recon.matchSummary || {};
    var matchedCount = (ms.exactCount || 0) + (ms.fuzzyCount || 0) + (ms.semanticCount || 0) + (ms.manyToOneItemCount || 0);

    html += '<div style="font-size:14px;font-weight:700;color:#333;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;">匹配汇总</div>';
    html += '<table class="doc-table">';
    html += '<thead><tr><th>项目</th><th style="text-align:right;">数值</th></tr></thead>';
    html += '<tbody>';
    html += '<tr><td>匹配笔数</td><td style="text-align:right;">' + matchedCount + ' 笔</td></tr>';
    html += '<tr><td>匹配金额</td><td style="text-align:right;">¥ ' + fmt(recon.matchedAmount) + '</td></tr>';
    html += '<tr><td>精确匹配</td><td style="text-align:right;">' + (ms.exactCount || 0) + ' 笔</td></tr>';
    if (ms.fuzzyCount) html += '<tr><td>模糊匹配</td><td style="text-align:right;">' + ms.fuzzyCount + ' 笔</td></tr>';
    if (ms.semanticCount) html += '<tr><td>语义匹配</td><td style="text-align:right;">' + ms.semanticCount + ' 笔</td></tr>';
    if (ms.manyToOneCount) html += '<tr><td>多对一匹配</td><td style="text-align:right;">' + ms.manyToOneCount + ' 组</td></tr>';
    html += '<tr style="background:#f9fafb;font-weight:700;"><td>匹配率</td><td style="text-align:right;">' + (recon.matchRate || 0).toFixed(1) + '%</td></tr>';
    html += '</tbody></table>';

    html += '<div style="font-size:14px;font-weight:700;color:#333;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;">各方金额</div>';
    html += '<table class="doc-table">';
    html += '<thead><tr><th>项目</th><th style="text-align:right;">金额</th></tr></thead>';
    html += '<tbody>';
    html += '<tr><td>' + escapeHtml(sideALabel) + ' 总额</td><td style="text-align:right;">¥ ' + fmt(recon.sideATotalAmount) + '</td></tr>';
    html += '<tr><td>' + escapeHtml(sideBLabel) + ' 总额</td><td style="text-align:right;">¥ ' + fmt(recon.sideBTotalAmount) + '</td></tr>';
    if (ms.unmatchedACount) html += '<tr><td class="debit">' + escapeHtml(sideALabel) + ' 未匹配</td><td class="debit" style="text-align:right;">' + ms.unmatchedACount + ' 笔 / ¥ ' + fmt(recon.unmatchedAAmount) + '</td></tr>';
    if (ms.unmatchedBCount) html += '<tr><td class="debit">' + escapeHtml(sideBLabel) + ' 未匹配</td><td class="debit" style="text-align:right;">' + ms.unmatchedBCount + ' 笔 / ¥ ' + fmt(recon.unmatchedBAmount) + '</td></tr>';
    html += '<tr style="background:#f9fafb;font-weight:700;"><td>核验结论</td><td style="text-align:right;color:' + (isBalanced ? '#00c4a1' : '#e53935') + ';">' + (isBalanced ? '全部一致' : '存在差异') + '</td></tr>';
    html += '</tbody></table>';
  }

  // 匹配明细
  if (matchResults) {
    var allMatches = [].concat(matchResults.exact || [], matchResults.fuzzy || [], matchResults.semantic || [], matchResults.manyToOne || []);
    if (allMatches.length > 0) {
      html += '<div style="font-size:14px;font-weight:700;color:#333;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;">匹配明细</div>';
      html += '<table class="doc-table"><thead><tr><th>类型</th><th>' + escapeHtml(sideALabel) + '</th><th>金额</th><th>' + escapeHtml(sideBLabel) + '</th><th>金额</th></tr></thead><tbody>';
      var typeNames = { exact: '精确', fuzzy: '模糊', semantic: '语义', manyToOne: '多对一' };
      ['exact', 'fuzzy', 'semantic', 'manyToOne'].forEach(function(type) {
        var items = matchResults[type] || [];
        items.slice(0, 20).forEach(function(m) {
          var aDesc = m.sideA ? (m.sideA.description || m.sideA.counterparty || '-') : '-';
          var aAmt = m.sideA ? (m.sideA.amount || 0) : 0;
          var bDesc = m.sideB ? (m.sideB.description || m.sideB.counterparty || '-') : '-';
          var bAmt = m.sideB ? (m.sideB.amount || 0) : 0;
          html += '<tr><td><span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#f0f0f0;color:#666;">' + typeNames[type] + '</span></td>';
          html += '<td>' + escapeHtml(String(aDesc).slice(0, 18)) + '</td>';
          html += '<td style="text-align:right;">¥ ' + fmt(aAmt) + '</td>';
          html += '<td>' + escapeHtml(String(bDesc).slice(0, 18)) + '</td>';
          html += '<td style="text-align:right;">¥ ' + fmt(bAmt) + '</td></tr>';
        });
      });
      html += '</tbody></table>';
      if (allMatches.length > 20) {
        html += '<div style="text-align:center;font-size:11px;color:#999;margin-top:8px;">仅显示前 20 条，共 ' + allMatches.length + ' 条匹配记录</div>';
      }
    }
  }

  // 底部签章
  html += '<div style="margin-top:48px;padding-top:24px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;font-size:11px;color:#999;">';
  html += '<span>制表：AI 智能对账系统</span>';
  html += '<span>审核：________________</span>';
  html += '<span>日期：' + new Date().toISOString().slice(0, 10) + '</span>';
  html += '</div>';

  return html;
}

// 保存结果后：切回 List 页布局，中间展示正式的余额调节表文档
function showResultFullPage(data) {
  var recon = data.reconciliation;
  var scenario = data.scenario;
  if (!recon) return;

  // 切回阅读模式
  tabs.forEach(function(t) { t.classList.remove('active'); });
  tabs[0].classList.add('active');
  readMode.style.display = 'flex';
  reconMode.style.display = 'none';
  viewbar.style.display = 'flex';
  readerFooter.style.display = 'flex';

  var reportTitle = (scenario && scenario.reportTitle) || '银行余额调节表';
  document.querySelector('.cs-reader-logo span').textContent = reportTitle;

  // 复用 renderReconReport 生成文档内容
  document.getElementById('paper').innerHTML = renderReconReport(data);

  // 更新缩略图
  document.getElementById('thumbs').innerHTML =
    '<div class="cs-reader-thumb active"><div style="font-size:9px;color:#999;">调节表</div><div class="cs-reader-thumb-label">1</div></div>' +
    '<div class="cs-reader-thumb"><div style="font-size:9px;color:#999;">明细</div><div class="cs-reader-thumb-label">2</div></div>';
  document.getElementById('pageInfo').textContent = '1 / 2';
}

// 把点击的文件渲染到左侧面板（显示真实文档）
function renderFileInLeftPanel(file) {
  var name = file.name || '文档';
  var role = file.role || '';
  var roleLabels = { sideA: '银行流水', sideB: '企业账簿', sideC: '辅助数据', auto: '未分类' };
  var roleLabel = roleLabels[role] || '';

  // 更新左侧标题
  var headerSpan = document.querySelector('.cs-recon-split-left .cs-recon-split-header span');
  if (headerSpan) headerSpan.textContent = name + (roleLabel ? ' (' + roleLabel + ')' : '');

  var html = '';
  var dataUrl = file.dataUrl;
  var mime = file.mimeType || '';

  if (mime.startsWith('image/')) {
    html = '<img src="' + dataUrl + '" style="width:100%;height:auto;display:block;" />';
  } else if (mime === 'application/pdf') {
    html = '<iframe src="' + dataUrl + '" style="width:100%;height:100%;border:none;"></iframe>';
  } else if (mime.includes('sheet') || mime.includes('excel') || name.match(/\.(xlsx|xls|csv)$/i)) {
    html = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#666;">';
    html += '<svg width="64" height="64" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" fill="#217346"/><path d="M7 7h4v3H7zm0 4h4v3H7zm0 4h4v2H7zm5-8h5v3h-5zm0 4h5v3h-5zm0 4h5v2h-5z" fill="rgba(255,255,255,0.8)"/></svg>';
    html += '<div style="font-size:14px;font-weight:500;">' + escapeHtml(name) + '</div>';
    html += '<div style="font-size:12px;color:#999;">Excel 文件无法直接预览图像</div>';
    html += '</div>';
  } else {
    html = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#999;">';
    html += '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 8h8M8 12h5"/></svg>';
    html += '<p>' + escapeHtml(name) + '</p>';
    html += '</div>';
  }

  reconDocView.innerHTML = html;
}

// 检测 URL 参数：直接展示最新保存的调节表结果
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('showResult') === 'latest') {
    var raw = localStorage.getItem('cs_recon_latest_result');
    if (raw) {
      try {
        var data = JSON.parse(raw);
        var paper = document.getElementById('paper');
        paper.innerHTML = renderReconReport(data);
        var title = (data.scenario && data.scenario.reportTitle) || '余额调节表';
        document.querySelector('.cs-reader-logo span').textContent = title;
        document.getElementById('thumbs').innerHTML =
          '<div class="cs-reader-thumb active"><div style="font-size:9px;color:#999;">调节表</div><div class="cs-reader-thumb-label">1</div></div>' +
          '<div class="cs-reader-thumb"><div style="font-size:9px;color:#999;">明细</div><div class="cs-reader-thumb-label">2</div></div>';
        document.getElementById('pageInfo').textContent = '1 / 2';
      } catch(e) {}
    }
  }
})();
</script>
